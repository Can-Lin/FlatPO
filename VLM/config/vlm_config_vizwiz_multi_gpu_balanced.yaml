### model
model_name_or_path: /ssd/lincan/models/Qwen2.5-VL-3B
quantization_bit: 4
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
# Keep these explicit so memory behavior is stable across runs.
freeze_vision_tower: true
freeze_multi_modal_projector: true

### dataset
dataset: vizwiz_val_local
dataset_dir: /home/lincan/Finetune-Qwen2.5-VL/data
# Moderate reduction from 2048 -> 1792 to lower text-side activation memory.
cutoff_len: 1792
overwrite_cache: true
preprocessing_num_workers: 16

### processor
# Moderate cap for image pixels; tune this first if you still see OOM.
# 672x672 = 451,584
image_resolution: 451584

### output
output_dir: /ssd/lincan/mllm_ckpt/qwen2.5-vl/lora/vizwiz_balanced
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
# Keep gradient checkpointing on (default), set explicit for readability.
disable_gradient_checkpointing: false
use_reentrant_gc: true

ddp_timeout: 180000000
use_accelerate: true
