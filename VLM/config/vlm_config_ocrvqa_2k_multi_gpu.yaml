### model
model_name_or_path: /ssd/lincan/models/Qwen2.5-VL-3B
quantization_bit: 4
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset: ocrvqa_train_local
dataset_dir: /home/lincan/Finetune-Qwen2.5-VL/data
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /ssd/lincan/mllm_ckpt/qwen2.5-vl/lora/ocrvqa_2k
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
use_accelerate: true
